name: Datathing ChartKit CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            chartkit/package-lock.json
            example-react-app/package-lock.json

      - name: Install ChartKit dependencies
        working-directory: chartkit
        run: npm ci

      - name: Build ChartKit
        working-directory: chartkit
        run: npm run build

      - name: Install example app dependencies
        working-directory: example-react-app
        run: npm ci

      - name: Build example app
        working-directory: example-react-app
        run: npm run build
